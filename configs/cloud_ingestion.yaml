server:
  host: "0.0.0.0"
  port: 8100
  workers: 2
  log_level: "INFO"
  max_request_size_mb: 10

database:
  url: "sqlite:///tmp/cloud_ingestion_dev.db"
  pool_size: 5
  max_overflow: 10

auth:
  api_key: "${GLI_API_KEY:-dev-key-change-in-production}"
  enabled: true

rate_limiting:
  max_requests_per_minute: 120

cors:
  allowed_origins:
    - "*"
