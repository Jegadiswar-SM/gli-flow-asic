name: GLI-FLOW CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install rich

      - name: Environment Validation
        run: |
          python3 environment/validate_environment.py

      - name: Governance Validation
        run: |
          python3 governance/policy_engine.py

      - name: Contract Validation
        run: |
          python3 contracts/contract_engine.py

      - name: Reproducibility Verification
        run: |
          python3 environment/reproducibility_check.py

      - name: Analytics Generation
        run: |
          python3 analytics/execution_analytics.py

      - name: Reliability Scoring
        run: |
          python3 analytics/reliability_score.py
