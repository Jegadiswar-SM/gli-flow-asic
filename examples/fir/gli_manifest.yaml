design_name: fir_top
rtl_files:
  - examples/fir/rtl/fir.v
top_module: fir_top
backend: openroad
pdk: sky130
pdk_variant: sky130A
clock_port: clk
clock_period_ns: 10.0
threads: 4
run_mode: educational_demo
corners:
